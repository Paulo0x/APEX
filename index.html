/* ============================================================
   APEX — Fitness Park Style
   Bleu marine profond + Jaune or
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root {
  --bg:      #080e1a;
  --bg2:     #0d1526;
  --bg3:     #121e33;
  --bg4:     #182540;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text:    #f0f4ff;
  --text2:   #8899bb;
  --text3:   #445577;
  --gold:    #f5c518;
  --gold-dim:rgba(245,197,24,0.1);
  --gold-glow:rgba(245,197,24,0.25);
  --green:   #22dd66;
  --green-dim:rgba(34,221,102,0.1);
  --red:     #ff4444;
  --red-dim: rgba(255,68,68,0.1);
  --blue:    #2288ff;
  --blue-dim:rgba(34,136,255,0.1);
  --purple:  #aa44ff;
  --r: 16px;
  --r-sm: 10px;
  --r-lg: 22px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

html, body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── FOND TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 85% 5%, rgba(30,70,180,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 15% 90%, rgba(10,40,120,0.15) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ── SPLASH ── */
.splash {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
  transition: opacity 0.5s, transform 0.5s;
}
.splash.out { opacity: 0; transform: scale(1.04); pointer-events: none; }
.splash-inner { text-align: center; }
.splash-logo { font-size: 14px; font-weight: 800; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; }
.splash-name { font-size: 52px; font-weight: 900; letter-spacing: -2px; color: var(--text); line-height: 1; }
.splash-tag { font-size: 10px; font-weight: 600; letter-spacing: 5px; color: var(--text3); margin-top: 8px; text-transform: uppercase; }
.splash-bar { width: 160px; height: 2px; background: var(--bg3); border-radius: 2px; margin: 28px auto 0; overflow: hidden; }
.splash-fill { height: 100%; background: linear-gradient(90deg, var(--bg3), var(--gold)); animation: load 1.8s ease forwards; }
@keyframes load { from{width:0} to{width:100%} }

/* ── APP ── */
.app { display: flex; flex-direction: column; min-height: 100dvh; position: relative; z-index: 1; }
.app.hidden { display: none; }

/* ── HEADER ── */
.hdr {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  padding-top: calc(16px + env(safe-area-inset-top));
  background: rgba(8,14,26,0.88);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.hdr-back {
  background: var(--bg3); border: none; color: var(--text);
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all 0.2s;
}
.hdr-back:active { background: var(--bg4); transform: scale(0.9); }
.hdr-back.hidden { display: none; }
.hdr-brand { font-size: 20px; font-weight: 900; letter-spacing: 2px; color: var(--text); }
.hdr-title-text { flex: 1; font-size: 17px; font-weight: 700; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.week-chip {
  background: var(--gold-dim); color: var(--gold);
  border: 1px solid rgba(245,197,24,0.2);
  padding: 5px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.5px;
  cursor: pointer; transition: all 0.2s;
}
.week-chip.deload { background: var(--red-dim); color: var(--red); border-color: rgba(255,68,68,0.2); }

/* ── SCREENS ── */
#main { flex: 1; overflow-y: auto; padding-bottom: 80px; }
.screen { display: none; animation: fadeUp 0.25s ease; }
.screen.active { display: block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.content-pad { padding: 16px; padding-bottom: 100px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex;
  background: rgba(8,14,26,0.96);
  backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 50;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 4px; background: none; border: none;
  font-family: var(--font); font-size: 9px; font-weight: 800;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--text3); cursor: pointer; transition: color 0.2s;
}
.nav-item.active { color: var(--gold); }
.nav-item svg { transition: transform 0.2s; }
.nav-item.active svg { transform: scale(1.1); }
.nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); margin-top: 2px; display: none; }
.nav-item.active .nav-dot { display: block; }

/* ── HOME HEADER ── */
.home-top {
  padding: 22px 20px 0;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.home-day { font-size: 34px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; }
.home-date { font-size: 13px; font-weight: 500; color: var(--text2); margin-top: 4px; }
.streak-pill {
  background: var(--gold-dim); border: 1px solid rgba(245,197,24,0.2);
  border-radius: 14px; padding: 8px 14px;
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.streak-num { font-size: 18px; font-weight: 900; color: var(--gold); letter-spacing: -0.5px; }
.streak-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: rgba(245,197,24,0.55); text-transform: uppercase; }

/* ── HERO CARD ── */
.hero-card {
  margin: 16px;
  border-radius: var(--r-lg);
  background: linear-gradient(145deg, #16356b 0%, #0d2448 55%, #060f20 100%);
  border: 1px solid rgba(255,255,255,0.07);
  padding: 20px;
  position: relative; overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute; top: -50px; right: -40px;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, rgba(245,197,24,0.08) 0%, transparent 65%);
}
.hero-card::after {
  content: '';
  position: absolute; bottom: -40px; left: -30px;
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, rgba(34,136,255,0.06) 0%, transparent 65%);
}
.hero-week { font-size: 9px; font-weight: 700; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; position: relative; z-index: 1; }
.hero-kpis { display: flex; position: relative; z-index: 1; margin-bottom: 16px; }
.kpi { flex: 1; text-align: center; }
.kpi-val { font-size: 30px; font-weight: 900; color: var(--text); letter-spacing: -1.5px; line-height: 1; }
.kpi-val.gold { color: var(--gold); }
.kpi-unit { font-size: 14px; color: rgba(255,255,255,0.3); font-weight: 400; }
.kpi-lbl { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.25); margin-top: 4px; text-transform: uppercase; }
.kpi-sep { width: 1px; background: rgba(255,255,255,0.07); margin: 4px 0; }

.cycle-wrap { position: relative; z-index: 1; }
.cycle-track { height: 2px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: visible; }
.cycle-fill { height: 100%; background: linear-gradient(90deg, #1e60d0, var(--gold)); border-radius: 2px; position: relative; transition: width 0.6s ease; }
.cycle-dot { position: absolute; right: -3px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold-glow); }
.cycle-labels { display: flex; justify-content: space-between; margin-top: 6px; }
.cycle-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: rgba(255,255,255,0.2); }
.cycle-lbl.mid { color: rgba(245,197,24,0.6); }

/* ── QUOTE ── */
.quote {
  margin: 0 16px 14px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.02);
  border-left: 2px solid rgba(245,197,24,0.3);
  border-radius: 0 10px 10px 0;
}
.quote-text { font-size: 12px; font-style: italic; color: rgba(255,255,255,0.4); line-height: 1.5; }
.quote-author { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: rgba(245,197,24,0.45); margin-top: 3px; text-transform: uppercase; }

/* ── SECTION HEADER ── */
.section-hdr { padding: 4px 20px 12px; display: flex; justify-content: space-between; align-items: center; }
.section-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.section-link { font-size: 12px; font-weight: 700; color: var(--gold); }

/* ── SESSION CARDS (home) ── */
.sessions-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

/* Carte "Aujourd'hui" — grande avec photo */
.card-today {
  border-radius: var(--r);
  overflow: hidden;
  position: relative;
  height: 140px;
  cursor: pointer;
  transition: transform 0.15s;
}
.card-today:active { transform: scale(0.98); }
.card-today-photo {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  background-color: var(--bg3);
}
.card-today-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(6,12,22,0.92) 0%, rgba(6,12,22,0.5) 60%, rgba(6,12,22,0.2) 100%);
}
.today-tag {
  position: absolute; top: 12px; left: 14px;
  background: var(--gold); border-radius: 5px;
  padding: 3px 10px; font-size: 9px; font-weight: 900;
  color: #000; letter-spacing: 1.5px; text-transform: uppercase;
}
.card-today-content {
  position: absolute; bottom: 14px; left: 14px; right: 60px;
}
.card-today-day { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.45); text-transform: uppercase; margin-bottom: 2px; }
.card-today-name { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -0.5px; margin-bottom: 6px; }
.card-pills { display: flex; gap: 4px; flex-wrap: wrap; }
.card-pill { font-size: 10px; color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.card-today-go {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px var(--gold-glow);
}

/* Carte normale */
.card-normal {
  border-radius: var(--r);
  background: rgba(255,255,255,0.035);
  border: 1px solid var(--border);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all 0.15s;
  position: relative; overflow: hidden;
}
.card-normal:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }
.card-normal::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
.card-normal.push::before  { background: var(--red); }
.card-normal.pull::before  { background: var(--blue); }
.card-normal.legs::before  { background: var(--green); }
.card-normal.upper::before { background: var(--purple); }
.card-normal.arms::before  { background: var(--gold); }

.card-icon { width: 44px; height: 44px; border-radius: 12px; background-size: cover; background-position: center; background-color: var(--bg3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; }
.card-info { flex: 1; min-width: 0; }
.card-day { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 2px; }
.card-name { font-size: 15px; font-weight: 800; color: rgba(255,255,255,0.55); letter-spacing: -0.2px; }
.card-name.done-name { text-decoration: line-through; text-decoration-color: rgba(34,221,102,0.35); color: rgba(255,255,255,0.35); }
.card-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.card-done-badge { background: var(--green-dim); border: 1px solid rgba(34,221,102,0.2); border-radius: 8px; padding: 3px 9px; font-size: 10px; font-weight: 800; color: var(--green); flex-shrink: 0; }
.card-arr { color: var(--text3); flex-shrink: 0; }

/* ── SESSION SCREEN ── */
/* Header photo séance */
.session-hero {
  position: relative; height: 220px; overflow: hidden;
}
.session-hero-photo {
  width: 100%; height: 100%;
  object-fit: cover;
  background-size: cover; background-position: center;
  background-color: var(--bg3);
}
.session-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(8,14,26,0.3) 0%, rgba(8,14,26,0.85) 100%);
}
.session-hero-content {
  position: absolute; bottom: 16px; left: 16px; right: 16px;
}
.session-hero-name { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -0.5px; margin-bottom: 6px; }
.session-hero-meta { display: flex; gap: 16px; }
.session-hero-stat { display: flex; align-items: center; gap: 5px; font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; }
.session-hero-stat svg { opacity: 0.6; }

.sess-prog-bar { height: 3px; background: var(--bg3); }
.sess-prog-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--gold)); transition: width 0.4s ease; width: 0; }

.sess-tools { display: flex; gap: 8px; padding: 12px 16px 8px; overflow-x: auto; scrollbar-width: none; }
.sess-tools::-webkit-scrollbar { display: none; }
.tool-pill { display: flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 20px; border: 1px solid transparent; font-family: var(--font); font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
.tool-pill:active { transform: scale(0.95); }
.pill-fire  { background: var(--gold-dim); color: var(--gold); border-color: rgba(245,197,24,0.2); }
.pill-copy  { background: var(--blue-dim); color: var(--blue); border-color: rgba(34,136,255,0.2); }
.pill-zen   { background: var(--green-dim); color: var(--green); border-color: rgba(34,221,102,0.2); }
.pill-check { color: var(--green); }

/* ── EXERCISE CARDS ── */
.exo-card {
  margin: 6px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color 0.3s;
}
.exo-card.complete { border-color: rgba(34,221,102,0.25); }

/* Photo exercice dans le header */
.exo-photo-wrap {
  height: 180px;
  position: relative;
  overflow: hidden;
  background: var(--bg3);
}
.exo-photo {
  width: 100%; height: 100%;
  background-size: cover; background-position: center;
  background-color: var(--bg3);
  transition: transform 0.3s;
}
.exo-photo-wrap:hover .exo-photo { transform: scale(1.02); }
.exo-photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(8,14,26,0.15) 0%, rgba(8,14,26,0.7) 100%);
}
.exo-photo-content {
  position: absolute; bottom: 12px; left: 14px; right: 14px;
  display: flex; align-items: flex-end; justify-content: space-between;
}
.exo-photo-name { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
.exo-photo-level { background: rgba(245,197,24,0.15); border: 1px solid rgba(245,197,24,0.25); border-radius: 6px; padding: 3px 9px; font-size: 10px; font-weight: 700; color: var(--gold); }
.exo-photo-num {
  position: absolute; top: 10px; left: 14px;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--gold); color: #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900;
}
.exo-card.complete .exo-photo-num { background: var(--green); color: #fff; }

/* Toggle header (pour ouvrir/fermer sans photo) */
.exo-header-simple {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer; user-select: none;
}
.exo-num-sm {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(245,197,24,0.15); color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; flex-shrink: 0;
  border: 1px solid rgba(245,197,24,0.25);
}
.exo-card.complete .exo-num-sm { background: var(--green-dim); color: var(--green); border-color: rgba(34,221,102,0.25); }
.exo-info { flex: 1; min-width: 0; }
.exo-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.exo-specs { display: flex; gap: 5px; flex-wrap: wrap; }
.exo-spec { font-size: 10px; color: var(--text2); background: var(--bg3); padding: 2px 7px; border-radius: 5px; }
.exo-spec.main { color: var(--gold); background: var(--gold-dim); font-weight: 700; }
.exo-status { font-size: 12px; color: var(--text3); text-align: right; }
.exo-status.done-all { color: var(--green); font-weight: 700; }

.exo-body { border-top: 1px solid var(--border); }
.exo-body.collapsed { display: none; }

/* Progression bar exo */
.exo-prog { height: 2px; background: var(--bg3); }
.exo-prog-fill { height: 100%; background: var(--gold); transition: width 0.3s; }

.exo-technique { margin: 12px 16px 6px; padding: 10px 13px; background: var(--bg3); border-radius: var(--r-sm); border-left: 2px solid rgba(34,136,255,0.4); font-size: 13px; color: var(--text2); line-height: 1.6; }
.exo-technique strong { color: var(--text); }

/* Muscles travaillés */
.muscle-bar { margin: 0 16px 10px; display: flex; align-items: center; gap: 8px; }
.muscle-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
.muscle-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.muscle-tag { font-size: 10px; font-weight: 600; color: var(--gold); background: var(--gold-dim); border: 1px solid rgba(245,197,24,0.15); padding: 2px 8px; border-radius: 5px; }

.coach-banner { margin: 0 16px 6px; padding: 8px 12px; border-radius: var(--r-sm); font-size: 12px; display: flex; align-items: flex-start; gap: 6px; line-height: 1.4; }
.coach-banner.progress { background: var(--green-dim); color: var(--green); }
.coach-banner.maintain { background: var(--blue-dim); color: var(--blue); }
.coach-banner.reduce   { background: var(--red-dim);   color: var(--red); }
.coach-banner.deload   { background: rgba(100,100,255,0.08); color: #a0a0ff; }
.coach-banner.plateau  { background: var(--gold-dim); color: var(--gold); }
.last-perf { margin: 0 16px 8px; padding: 7px 12px; background: var(--bg3); border-radius: var(--r-sm); font-size: 11px; color: var(--text2); }
.last-perf strong { color: var(--green); }

/* SETS */
.sets-wrap { padding: 0 16px 14px; }
/* Header des séries style FP — grilles avec reps */
.sets-fp-header {
  display: grid; grid-template-columns: 28px 1fr 1fr 44px 40px;
  gap: 6px; padding: 6px 0;
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--text3); text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.sets-fp-header span { text-align: center; }
.set-row {
  display: grid; grid-template-columns: 28px 1fr 1fr 44px 40px;
  gap: 6px; padding: 7px 0;
  align-items: center; border-bottom: 1px solid var(--border);
  transition: opacity 0.2s;
}
.set-row:last-child { border-bottom: none; }
.set-row.set-done { opacity: 0.5; }
.set-row.active-set { background: rgba(245,197,24,0.03); border-radius: var(--r-sm); }
.set-num { text-align: center; font-size: 12px; color: var(--text3); font-weight: 600; }
.set-num.cur { color: var(--gold); font-weight: 800; }
.set-w-group { display: flex; align-items: center; gap: 2px; }
.set-adj { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); width: 22px; height: 38px; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.12s; }
.set-adj:active { background: var(--gold-dim); color: var(--gold); transform: scale(0.92); }
.set-input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 9px 4px; border-radius: var(--r-sm); font-family: var(--font); font-size: 15px; font-weight: 700; width: 100%; text-align: center; -moz-appearance: textfield; transition: border-color 0.15s; min-width: 0; }
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.set-input:focus { outline: none; border-color: var(--gold); background: rgba(245,197,24,0.04); }
.set-input[readonly] { opacity: 0.4; pointer-events: none; }
.set-input::placeholder { color: var(--text3); font-size: 11px; font-weight: 400; }
.set-input.coach-fill { border-color: rgba(245,197,24,0.3); background: rgba(245,197,24,0.03); }
.set-rest-inline { font-size: 11px; font-weight: 700; font-family: monospace; color: var(--text3); text-align: center; width: 44px; }
.set-rest-inline.running { color: var(--gold); }
.set-rest-inline.done { color: var(--green); }
.set-ok { background: var(--bg3); border: 1.5px solid var(--border2); color: var(--text3); width: 40px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; transition: all 0.2s; }
.set-ok:active { transform: scale(0.88); }
.set-ok.validated { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 900; }

.exo-actions { display: flex; gap: 6px; padding: 0 16px 12px; }
.exo-btn-sm { flex: 1; background: var(--bg3); border: 1px dashed rgba(255,255,255,0.08); color: var(--text2); padding: 7px; border-radius: var(--r-sm); font-family: var(--font); font-size: 11px; cursor: pointer; text-align: center; transition: all 0.15s; }
.exo-btn-sm:active { background: var(--bg4); color: var(--text); }
.exo-note-row { padding: 0 16px 12px; }
.exo-note-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 8px 12px; border-radius: var(--r-sm); font-family: var(--font); font-size: 12px; resize: none; height: 36px; transition: all 0.15s; }
.exo-note-input:focus { outline: none; border-color: rgba(255,255,255,0.15); height: 60px; color: var(--text); }
.exo-note-input::placeholder { color: var(--text3); }

/* ── FINISH ── */
.finish-zone { padding: 20px 16px; }
.finish-meta { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 12px; }
.btn-finish { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; border-radius: var(--r); font-family: var(--font); font-size: 16px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; letter-spacing: 0.3px; }
.btn-finish:active { transform: scale(0.98); background: #d9aa10; }
.btn-finish.btn-amber { background: var(--gold); }
.btn-finish.btn-green { background: var(--green); color: #fff; }
.btn-finish.btn-green:active { background: #1ab850; }

/* ── TIMER ── */
.rest-timer { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid rgba(245,197,24,0.2); border-radius: 22px; padding: 16px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); z-index: 200; text-align: center; min-width: 256px; animation: timerUp 0.3s cubic-bezier(0.34,1.4,0.64,1); }
.rest-timer.hidden { display: none; }
@keyframes timerUp { from{transform:translateX(-50%) translateY(30px);opacity:0;} to{transform:translateX(-50%) translateY(0);opacity:1;} }
.timer-ring-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 12px; }
.timer-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--bg3); stroke-width: 8; }
.ring-fill { fill: none; stroke: var(--gold); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 327; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
.ring-fill.ending { stroke: var(--red); }
.ring-fill.done { stroke: var(--green); }
.timer-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.timer-time { font-size: 28px; font-weight: 900; color: var(--text); line-height: 1; }
.timer-lbl { font-size: 9px; color: var(--text3); letter-spacing: 2px; margin-top: 2px; text-transform: uppercase; }
.timer-row { display: flex; gap: 6px; justify-content: center; }
.tbtn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 10px; font-family: var(--font); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.tbtn:active { background: var(--bg4); }
.tbtn-main { background: var(--gold-dim); color: var(--gold); border-color: rgba(245,197,24,0.2); font-size: 17px; padding: 7px 14px; }
.tbtn-close { color: var(--text3); }

/* ── MODAL ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 300; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s; }
.modal-backdrop.hidden { display: none; }
.modal-sheet { background: var(--bg2); border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; max-height: 88vh; overflow-y: auto; padding: 16px 16px 40px; animation: sheetUp 0.3s cubic-bezier(0.34,1.2,0.64,1); }
@keyframes sheetUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 18px; }
.plan-item { background: var(--bg3); border-radius: var(--r-sm); padding: 11px 13px; margin-bottom: 8px; }
.plan-item-name { font-size: 13px; font-weight: 700; margin-bottom: 7px; }
.plan-item-row { display: flex; align-items: center; gap: 8px; }
.plan-weight-input { background: var(--bg2); border: 1.5px solid var(--border2); color: var(--text); padding: 7px 8px; border-radius: 8px; font-family: var(--font); font-size: 16px; font-weight: 700; width: 85px; text-align: center; -moz-appearance: textfield; }
.plan-weight-input::-webkit-outer-spin-button,.plan-weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.plan-weight-input:focus { outline: none; border-color: var(--gold); }
.plan-reps { font-size: 13px; color: var(--text2); }
.plan-reason { font-size: 10px; padding: 3px 8px; border-radius: 5px; margin-top: 6px; display: inline-block; }
.plan-reason.progress { background: var(--green-dim); color: var(--green); }
.plan-reason.maintain { background: var(--blue-dim); color: var(--blue); }
.plan-reason.reduce   { background: var(--red-dim);   color: var(--red); }
.plan-reason.deload   { background: rgba(100,100,255,0.08); color: #a0a0ff; }
.plan-reason.plateau  { background: var(--gold-dim); color: var(--gold); }

/* ── WARMUP ── */
.wu-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; }
.wu-card-hdr { display: flex; align-items: center; justify-content: space-between; padding: 13px 15px; }
.wu-card.general .wu-card-hdr { border-left: 3px solid var(--gold); }
.wu-card.specific .wu-card-hdr { border-left: 3px solid var(--blue); }
.wu-card.cooldown-type .wu-card-hdr { border-left: 3px solid var(--green); }
.wu-title { font-size: 14px; font-weight: 700; }
.wu-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.wu-dur { background: var(--bg3); color: var(--text2); padding: 3px 9px; border-radius: 7px; font-size: 11px; font-weight: 600; }
.wu-phase { padding: 11px 15px; border-top: 1px solid var(--border); }
.wu-phase-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.wu-phase-title { font-size: 13px; font-weight: 600; }
.wu-phase-time { font-size: 10px; color: var(--blue); background: var(--blue-dim); padding: 2px 7px; border-radius: 5px; }
.wu-item { display: flex; align-items: flex-start; gap: 7px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text2); line-height: 1.5; }
.wu-item:last-child { border-bottom: none; }
.wu-item::before { content: '›'; color: var(--gold); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.wu-item strong { color: var(--text); }
.wu-alert { margin: 8px 15px; padding: 9px 11px; border-radius: var(--r-sm); font-size: 12px; line-height: 1.5; }
.wu-alert.warn { background: rgba(255,68,68,0.07); border-left: 2px solid var(--red); }
.wu-alert.tip  { background: var(--green-dim); border-left: 2px solid var(--green); }
.wu-alert.warn strong { color: var(--red); }
.wu-alert.tip strong { color: var(--green); }
.wu-summary { background: var(--bg3); border-radius: var(--r); padding: 14px; text-align: center; margin-bottom: 14px; }
.wu-sum-val { font-size: 30px; font-weight: 900; color: var(--gold); line-height: 1; }
.wu-sum-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── COACH ── */
.coach-wrap { padding: 16px; }
.coach-hdr-card { background: linear-gradient(135deg, rgba(245,197,24,0.06), rgba(245,159,10,0.04)); border: 1px solid rgba(245,197,24,0.15); border-radius: var(--r); padding: 14px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
.coach-av { font-size: 36px; }
.coach-hdr-title { font-size: 16px; font-weight: 800; color: var(--gold); margin-bottom: 2px; }
.coach-hdr-sub { font-size: 12px; color: var(--text2); }
.coach-summary { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 13px; margin-bottom: 14px; }
.coach-summary-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
.coach-summary-row { font-size: 13px; margin-bottom: 5px; line-height: 1.5; }
.coach-quick-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.coach-q { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 7px 11px; border-radius: 18px; font-family: var(--font); font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.coach-q:active { background: var(--gold-dim); color: var(--gold); border-color: rgba(245,197,24,0.25); }
.coach-chat { display: flex; flex-direction: column; gap: 10px; min-height: 160px; margin-bottom: 14px; }
.cmsg { padding: 11px 13px; border-radius: var(--r); font-size: 13px; line-height: 1.6; max-width: 88%; }
.cmsg.ai   { background: var(--bg3); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
.cmsg.user { background: var(--gold-dim); color: var(--text); align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid rgba(245,197,24,0.2); }
.cmsg.thinking::after { content: '●  ●  ●'; color: var(--text3); animation: dots 1.2s infinite; }
@keyframes dots { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
.coach-input-row { display: flex; gap: 8px; border-top: 1px solid var(--border); padding-top: 12px; }
.coach-textarea { flex: 1; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 11px 13px; border-radius: var(--r); font-family: var(--font); font-size: 13px; resize: none; height: 46px; transition: all 0.15s; }
.coach-textarea:focus { outline: none; border-color: var(--gold); height: 76px; }
.coach-send { background: var(--gold); color: #000; border: none; padding: 11px 16px; border-radius: var(--r); font-family: var(--font); font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.15s; white-space: nowrap; align-self: flex-end; height: 46px; }
.coach-send:active { transform: scale(0.95); }
.coach-send:disabled { opacity: 0.4; pointer-events: none; }

/* ── STATS ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; text-align: center; }
.stat-val { font-size: 28px; font-weight: 900; color: var(--gold); line-height: 1; }
.stat-lbl { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-top: 4px; }
.chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; margin-bottom: 10px; }
.chart-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }
.chart-wrap { position: relative; height: 130px; }
canvas { width: 100% !important; }
.exo-sel { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 9px 12px; border-radius: var(--r-sm); font-family: var(--font); font-size: 13px; margin-bottom: 12px; appearance: none; cursor: pointer; }
.pr-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.pr-item:last-child { border-bottom: none; }
.pr-name { font-size: 13px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pr-val { font-size: 14px; font-weight: 800; color: var(--green); }
.pr-date { font-size: 10px; color: var(--text3); }
.heatmap-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin: 8px 0; }
.hm-day { aspect-ratio: 1; border-radius: 3px; background: var(--bg3); }
.hm-day.push  { background: var(--red); }
.hm-day.pull  { background: var(--blue); }
.hm-day.legs  { background: var(--green); }
.hm-day.upper { background: var(--purple); }
.hm-day.arms  { background: var(--gold); }
.hm-labels { display: flex; justify-content: space-around; font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--text3); margin-bottom: 3px; text-transform: uppercase; }
.weight-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.weight-inp { flex: 1; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 11px 12px; border-radius: var(--r-sm); font-family: var(--font); font-size: 17px; font-weight: 700; -moz-appearance: textfield; text-align: center; }
.weight-inp::-webkit-outer-spin-button,.weight-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.weight-unit { font-size: 14px; color: var(--text2); font-weight: 600; }
.btn-add-w { background: var(--gold); color: #000; border: none; padding: 11px 16px; border-radius: var(--r-sm); font-family: var(--font); font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-add-w:active { transform: scale(0.96); }
.mensuration-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.mensuration-inp-wrap { display: flex; flex-direction: column; gap: 4px; }
.mensuration-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; }
.mensuration-inp { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 8px 10px; border-radius: var(--r-sm); font-family: var(--font); font-size: 15px; font-weight: 700; -moz-appearance: textfield; text-align: center; }
.mensuration-inp::-webkit-outer-spin-button,.mensuration-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.week-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.wc-card { background: var(--bg3); border-radius: var(--r-sm); padding: 10px 12px; text-align: center; }
.wc-week { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--text3); margin-bottom: 6px; }
.wc-val { font-size: 20px; font-weight: 900; }

/* ── HISTORY ── */
.history-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 13px 15px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.history-item:active { background: var(--bg3); }
.history-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
.history-name { font-size: 15px; font-weight: 700; }
.history-date { font-size: 11px; color: var(--text3); }
.history-meta { font-size: 12px; color: var(--text2); }
.history-week-badge { display: inline-block; font-size: 10px; color: var(--gold); background: var(--gold-dim); padding: 2px 8px; border-radius: 6px; margin-top: 5px; }

/* ── SETTINGS ── */
.settings-group { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 12px; }
.settings-group-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; padding: 12px 15px 6px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 15px; border-top: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
.settings-row:first-of-type { border-top: none; }
.settings-row:active { background: var(--bg3); }
.settings-row-label { font-size: 14px; color: var(--text); }
.settings-row-val { font-size: 14px; color: var(--text2); }
.settings-row-danger { color: var(--red) !important; }
.week-btns-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; padding: 12px 15px; }
.w-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 10px 4px; border-radius: var(--r-sm); font-family: var(--font); font-size: 12px; font-weight: 600; text-align: center; cursor: pointer; transition: all 0.15s; }
.w-btn.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 800; }
.w-btn.deload { color: var(--red); border-color: rgba(255,68,68,0.25); }
.w-btn.deload.active { background: var(--red); color: #fff; border-color: var(--red); }
.w-btn:active { transform: scale(0.95); }
.settings-hint { font-size: 11px; color: var(--text3); padding: 0 15px 12px; line-height: 1.5; }
.theme-btns { display: flex; gap: 8px; padding: 10px 15px 14px; flex-wrap: wrap; }
.theme-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
.theme-btn.active { border-color: white; transform: scale(1.15); }
.theme-btn:active { transform: scale(0.9); }

/* ── TOAST ── */
.toast { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 11px 20px; border-radius: 14px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.4); opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 400; max-width: calc(100vw - 32px); text-align: center; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(34,221,102,0.3); }
.toast.error   { border-color: rgba(255,68,68,0.3); }
.toast.pr      { border-color: rgba(245,197,24,0.4); background: rgba(245,197,24,0.06); }

/* ── CONFETTI ── */
.confetti-p { position: fixed; width: 7px; height: 7px; border-radius: 2px; pointer-events: none; z-index: 500; animation: cfall 1.6s ease-in forwards; }
@keyframes cfall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(100vh) rotate(720deg);opacity:0;} }

@media(min-width:480px){
  .sessions-list { display: grid; grid-template-columns: 1fr 1fr; }
  .stat-grid { grid-template-columns: repeat(4,1fr); }
}

/* SVG inline dans les photos exercices */
.exo-photo-svg-only svg,
.exo-photo-svg svg { width: 100%; height: 100%; display: block; }
.exo-photo-has-img { position: relative; }

</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="splash">
  <div class="splash-inner">
    <div class="splash-logo">Peak Performance</div>
    <div class="splash-name">APEX</div>
    <div class="splash-tag">Dépasse tes limites</div>
    <div class="splash-bar"><div class="splash-fill"></div></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <!-- HEADER -->
  <header class="hdr" id="hdr">
    <button class="hdr-back hidden" id="hdr-back" onclick="goBack()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="hdr-title" style="flex:1"><span class="hdr-brand">APEX</span></div>
    <div class="hdr-right">
      <div class="week-chip" id="week-chip" onclick="showScreen('settings')">S1</div>
    </div>
  </header>

  <main id="main">

    <!-- HOME -->
    <section id="screen-home" class="screen active">
      <div class="home-top">
        <div>
          <div class="home-day" id="home-day">Lundi</div>
          <div class="home-date" id="home-date">7 avril · Semaine 1</div>
        </div>
        <div class="streak-pill">
          <span style="font-size:16px">🔥</span>
          <span class="streak-num" id="streak-num">0</span>
          <span class="streak-lbl">Jours</span>
        </div>
      </div>

      <div class="hero-card">
        <div class="hero-week" id="hero-week">SEMAINE 1 · ADAPTATION</div>
        <div class="hero-kpis">

<script>
/**
 * Paulo Tracker v4 — Coach IA
 * Algorithme de progression scientifique + API Claude
 */

// =================================================================
// CONSTANTES COACH
// =================================================================
const COACH_CONFIG = {
  minRepsToProgress: 0.85,   // 85% des séries dans la fourchette haute = progression
  weightIncrement: 2.5,       // kg par défaut
  weightIncrementBig: 5,      // kg pour les gros mouvements
  bigLifts: ['push-1','pull-1','upper-1','upper-2','legs-1','legs-2'],
  deloadWeek: 7,
  deloadFactor: 0.8,
  plateauWeeks: 2,            // semaines sans progression = plateau
};

// =================================================================
// ANALYSE D'UNE SÉANCE
// =================================================================
function analyzeSession(exoId, setsData, targetReps) {
  if (!setsData || !setsData.length) return null;
  const done = setsData.filter(s => s.done && s.weight && s.reps);
  if (!done.length) return null;

  // Parser la fourchette de reps "8-12" ou "10"
  const parts = String(targetReps).split('-');
  const repsMin = parseInt(parts[0]);
  const repsMax = parseInt(parts[1] || parts[0]);

  const weights = done.map(s => parseFloat(s.weight));
  const reps = done.map(s => parseInt(s.reps));
  const avgWeight = weights.reduce((a,b)=>a+b,0) / weights.length;
  const maxWeight = Math.max(...weights);
  const avgReps = reps.reduce((a,b)=>a+b,0) / reps.length;

  // % des séries où les reps atteignent le haut de la fourchette
  const highRepsRatio = done.filter(s => parseInt(s.reps) >= repsMax).length / done.length;
  // % des séries où les reps sont en dessous du bas de la fourchette
  const lowRepsRatio = done.filter(s => parseInt(s.reps) < repsMin).length / done.length;

  return {
    exoId,
    avgWeight,
    maxWeight,
    avgReps,
    highRepsRatio,
    lowRepsRatio,
    setsCompleted: done.length,
    consistent: Math.max(...weights) - Math.min(...weights) <= 5, // charges homogènes
  };
}

// =================================================================
// CALCUL DE LA PROGRESSION POUR LA SEMAINE SUIVANTE
// =================================================================
function computeNextWeek(exoId, currentWeek, allHistory) {
  // Récupérer les données de la séance
  const exo = findExo(exoId);
  if (!exo) return null;

  // Trouver les n dernières séances pour cet exo
  const records = getExoHistory(exoId, allHistory).slice(-6);
  if (!records.length) return null;

  const lastRecord = records[records.length - 1];
  const analysis = analyzeSession(exoId, lastRecord.sets, exo.reps);
  if (!analysis) return null;

  const isBigLift = COACH_CONFIG.bigLifts.includes(exoId);
  const increment = isBigLift ? COACH_CONFIG.weightIncrementBig : COACH_CONFIG.weightIncrement;

  // Semaine deload
  if (currentWeek + 1 === COACH_CONFIG.deloadWeek) {
    const pr = DB.get(`pr-${exoId}`);
    const baseWeight = pr ? pr.weight : analysis.maxWeight;
    return {
      suggestedWeight: Math.round(baseWeight * COACH_CONFIG.deloadFactor * 2) / 2,
      suggestedReps: exo.reps,
      reason: '❄️ Deload semaine 7 — charges réduites de 20%',
      type: 'deload',
    };
  }

  // Détecter un plateau (pas de progression depuis N semaines)
  if (records.length >= COACH_CONFIG.plateauWeeks + 1) {
    const recentWeights = records.slice(-COACH_CONFIG.plateauWeeks).map(r => {
      const sets = r.sets || [];
      const w = sets.filter(s=>s.done&&s.weight).map(s=>parseFloat(s.weight));
      return w.length ? Math.max(...w) : 0;
    });
    const isPlateauing = recentWeights.every(w => w <= recentWeights[0]);
    if (isPlateauing && recentWeights[0] > 0) {
      return {
        suggestedWeight: analysis.maxWeight,
        suggestedReps: exo.reps,
        reason: `⚠️ Plateau détecté (${COACH_CONFIG.plateauWeeks} semaines stables) — maintien de la charge, focus technique`,
        type: 'plateau',
        alert: true,
      };
    }
  }

  // Logique principale
  if (analysis.highRepsRatio >= COACH_CONFIG.minRepsToProgress) {
    // Toutes les séries dans la fourchette haute → augmenter la charge
    return {
      suggestedWeight: Math.round((analysis.maxWeight + increment) * 2) / 2,
      suggestedReps: exo.reps,
      reason: `💪 Objectif atteint (${Math.round(analysis.highRepsRatio*100)}% séries en fourchette haute) — +${increment} kg`,
      type: 'progress',
    };
  } else if (analysis.lowRepsRatio > 0.5) {
    // Plus de la moitié des séries en dessous du minimum → réduire
    const reduced = Math.round((analysis.maxWeight - increment) * 2) / 2;
    return {
      suggestedWeight: Math.max(reduced, increment),
      suggestedReps: exo.reps,
      reason: `📉 Charge trop lourde (${Math.round(analysis.lowRepsRatio*100)}% séries sous la fourchette) — −${increment} kg`,
      type: 'reduce',
    };
  } else {
    // Dans la fourchette cible → maintenir et pousser les reps
    return {
      suggestedWeight: analysis.maxWeight,
      suggestedReps: exo.reps,
      reason: `🎯 Charge correcte — maintien à ${analysis.maxWeight} kg, focus progression des reps`,
      type: 'maintain',
    };
  }
}

// =================================================================
// GÉNÉRER LE PLAN COMPLET DE LA SEMAINE SUIVANTE
// =================================================================
function generateNextWeekPlan(currentWeek) {
  const allHistory = DB.get('history', []);
  const plan = {};

  Object.values(PROGRAM.sessions).forEach(sess => {
    sess.exercises.forEach(exo => {
      const suggestion = computeNextWeek(exo.id, currentWeek, allHistory);
      if (suggestion) plan[exo.id] = suggestion;
    });
  });

  return plan;
}

// =================================================================
// HELPER — Historique d'un exo
// =================================================================
function getExoHistory(exoId, allHistory) {
  const results = [];
  allHistory.forEach(entry => {
    const data = DB.get(entry.key);
    if (!data?.sets?.[exoId]) return;
    results.push({
      date: entry.date,
      week: entry.week,
      sets: data.sets[exoId],
    });
  });
  return results.sort((a,b) => new Date(a.date) - new Date(b.date));
}

function findExo(exoId) {
  for (const sess of Object.values(PROGRAM.sessions)) {
    const e = sess.exercises.find(x => x.id === exoId);
    if (e) return e;
  }
  return null;
}

// =================================================================
// ANALYSE GLOBALE — Résumé pour le coach
// =================================================================
function buildCoachSummary() {
  const allHistory = DB.get('history', []);
  if (!allHistory.length) return null;

  const allExos = [];
  Object.values(PROGRAM.sessions).forEach(s => s.exercises.forEach(e => allExos.push(e)));

  const progressing = [];
  const stagnating = [];
  const declining = [];

  allExos.forEach(exo => {
    const hist = getExoHistory(exo.id, allHistory).slice(-4);
    if (hist.length < 2) return;

    const weights = hist.map(r => {
      const sets = r.sets || [];
      const w = sets.filter(s=>s.done&&s.weight).map(s=>parseFloat(s.weight));
      return w.length ? Math.max(...w) : 0;
    }).filter(w => w > 0);

    if (weights.length < 2) return;
    const trend = weights[weights.length-1] - weights[0];
    if (trend > 0) progressing.push({ name: exo.name, gain: `+${trend}kg` });
    else if (trend < 0) declining.push({ name: exo.name, loss: `${trend}kg` });
    else stagnating.push({ name: exo.name });
  });

  const totalSessions = allHistory.length;
  const totalVolume = (() => {
    let v = 0;
    allHistory.forEach(e => {
      const d = DB.get(e.key); if(!d?.sets) return;
      Object.values(d.sets).forEach(arr => arr.forEach(s => {
        if (s.done && s.weight) v += (parseFloat(s.weight)||0) * (parseInt(s.reps)||0);
      }));
    });
    return v;
  })();

  return { totalSessions, totalVolume, progressing, stagnating, declining };
}

// =================================================================
// APPEL API CLAUDE — Coach conversationnel
// =================================================================
async function askCoachAI(userQuestion, onChunk) {
  const summary = buildCoachSummary();
  const allHistory = DB.get('history', []).slice(0, 20);
  const week = DB.get('week', 1);
  const nextPlan = generateNextWeekPlan(week);

  // Construire le contexte détaillé
  const context = buildDetailedContext(allHistory, nextPlan, summary, week);

  const systemPrompt = `Tu es le coach sportif personnel de Paulo ROSA, 42 ans, 75 kg, 1m72.
Son programme : 5 séances/semaine (Push/Pull/Legs/Upper Hypertrophie/Arms & Shoulders).
Objectif : hypertrophie maximale du haut du corps + recomposition corporelle.
Tu connais toutes ses performances depuis le début du programme.
Réponds en français, de façon directe et bienveillante. Maximum 3-4 paragraphes.
Donne des conseils concrets et actionnables basés sur SES données réelles.`;

  const userMsg = `Voici mes données récentes :\n${context}\n\nMa question : ${userQuestion}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }],
        stream: true,
      }),
    });

    if (!response.ok) throw new Error(`API error: ${response.status}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          const text = parsed.delta?.text || parsed.content?.[0]?.text || '';
          if (text && onChunk) onChunk(text);
        } catch {}
      }
    }
  } catch (err) {
    throw new Error(`Impossible de contacter le coach IA : ${err.message}`);
  }
}

function buildDetailedContext(history, nextPlan, summary, currentWeek) {
  let ctx = `Semaine actuelle : ${currentWeek}/7\n`;
  ctx += `Séances totales : ${summary?.totalSessions || 0}\n`;
  ctx += `Volume total soulevé : ${Math.round((summary?.totalVolume || 0)/1000)} tonnes\n\n`;

  if (summary?.progressing?.length) {
    ctx += `Exercices en progression : ${summary.progressing.map(p=>`${p.name} (${p.gain})`).join(', ')}\n`;
  }
  if (summary?.stagnating?.length) {
    ctx += `Exercices stagnants : ${summary.stagnating.map(p=>p.name).join(', ')}\n`;
  }
  if (summary?.declining?.length) {
    ctx += `Exercices en régression : ${summary.declining.map(p=>`${p.name} (${p.loss})`).join(', ')}\n`;
  }

  ctx += `\nPlan suggéré semaine suivante :\n`;
  Object.entries(nextPlan).slice(0, 10).forEach(([id, plan]) => {
    const exo = findExo(id);
    if (exo) ctx += `- ${exo.name} : ${plan.suggestedWeight}kg × ${plan.suggestedReps} (${plan.reason})\n`;
  });

  const recent = history.slice(0, 5);
  if (recent.length) {
    ctx += `\n5 dernières séances : ${recent.map(e => `${e.sessionName} (S${e.week}, ${e.doneSets}/${e.totalSets} séries)`).join(' | ')}\n`;
  }

  return ctx;
}

  upper: () => EXERCISE_SVG["upper-1"],

};

  push: EXERCISE_SVG["push-1"],
  pull: EXERCISE_SVG["pull-1"],
  legs: EXERCISE_SVG["legs-1"],
  upper: EXERCISE_SVG["upper-1"],
  arms: EXERCISE_SVG["arms-4"],
};

function getExoSVG(exoId) {
  if (EXERCISE_SVG[exoId]) return EXERCISE_SVG[exoId];
  const cat = exoId.split('-')[0];
  return (DEFAULT_SVG[cat] || DEFAULT_SVG.push)();
}

function getExoImageHTML(exoId) {
  const photoUrl = (typeof EXERCISE_PHOTOS !== 'undefined' && EXERCISE_PHOTOS[exoId]) ? EXERCISE_PHOTOS[exoId] : null;
  const svg = getExoSVG(exoId);
  if (photoUrl) {
    return `<div class="exo-photo exo-photo-has-img"><img src="${photoUrl}" class="exo-photo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" style="width:100%;height:100%;object-fit:cover;display:block"><div class="exo-photo-svg" style="display:none;width:100%;height:100%">${svg}</div></div>`;
  }
  return `<div class="exo-photo exo-photo-svg-only">${svg}</div>`;
}

function getSessionImageHTML(sessId) {
  const photoUrl = (typeof SESSION_PHOTOS !== 'undefined' && SESSION_PHOTOS[sessId]) ? SESSION_PHOTOS[sessId] : null;
  const svg = SESSION_SVG[sessId] || SESSION_SVG.push;
  if (photoUrl) {
    return `<img src="${photoUrl}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div style="display:none;position:absolute;inset:0">${svg}</div>`;
  }
  return `<div style="position:absolute;inset:0">${svg}</div>`;
}
