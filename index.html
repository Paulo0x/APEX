<script>


/**
 * APEX v5 — Peak Performance
 * Logique principale complète
 */

// ================================================================
// CONSTANTES
// ================================================================
const QUOTES = [
  { text: "La douleur est temporaire. L'abandon est pour toujours.", author: "Lance Armstrong" },
  { text: "Ton corps peut tout. C'est ton esprit qu'il faut convaincre.", author: "Anonyme" },
  { text: "Le champion n'est pas celui qui ne tombe jamais, mais celui qui se relève.", author: "Muhammad Ali" },
  { text: "Pour aller loin, il faut d'abord vouloir y aller.", author: "Anonyme" },
  { text: "Chaque répétition te rapproche de la meilleure version de toi-même.", author: "Anonyme" },
  { text: "La progression n'est pas linéaire, mais elle est certaine.", author: "Anonyme" },
  { text: "Entraîne-toi dur. Récupère plus dur encore.", author: "Anonyme" },
  { text: "Ce que tu fais aujourd'hui définit qui tu seras demain.", author: "Anonyme" },
];

const THEMES = [
  { name: 'rouge', color: '#ff3b3b' },
  { name: 'bleu', color: '#0a84ff' },
  { name: 'vert', color: '#30d158' },
  { name: 'violet', color: '#bf5af2' },
  { name: 'orange', color: '#ff9f0a' },
];

const DAYS_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

// ================================================================
// STATE
// ================================================================
const S = {
  week: 1,
  session: null,
  prevScreen: null,
  chartExoId: null,
  coachHistory: [],
  nextWeekPlan: null,
  wakeLock: null,
  theme: 'rouge',
  increment: 2,
  inlineTimers: {},    // exoId -> { sec, running, iv }
};

// ================================================================
// STORAGE
// ================================================================
const DB = {
  get: (k, d=null) => { try { const v=localStorage.getItem(`apfp.${k}`); return v?JSON.parse(v):d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(`apfp.${k}`,JSON.stringify(v)); return true; } catch { return false; } },
  del: (k) => localStorage.removeItem(`apfp.${k}`),
  clear: () => Object.keys(localStorage).filter(k=>k.startsWith('apfp.')).forEach(k=>localStorage.removeItem(k)),
};
const sKey = id => `sess-${S.week}-${id}`;

// ================================================================
// INIT
// ================================================================
function init() {
  S.week    = DB.get('week', 1);
  S.theme   = DB.get('theme', 'rouge');
  S.increment = DB.get('increment', 2);
  applyTheme(S.theme);
  updateWeekChip();

  setTimeout(() => {
    const splash = document.getElementById('splash');
    splash.classList.add('out');
    setTimeout(() => {
      splash.style.display = 'none';
      document.getElementById('app').classList.remove('hidden');
      showScreen('home');
      requestWakeLock();
    }, 500);
  }, 2000);
}

// ================================================================
// THEME
// ================================================================
function applyTheme(name) {
  const t = THEMES.find(x => x.name === name) || THEMES[0];
  document.documentElement.style.setProperty('--red', t.color);
  document.documentElement.style.setProperty('--red-dim', hexToRgba(t.color, 0.12));
  document.documentElement.style.setProperty('--red-glow', hexToRgba(t.color, 0.25));
}
function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ================================================================
// WAKE LOCK
// ================================================================
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { S.wakeLock = await navigator.wakeLock.request('screen'); } catch {}
}
async function releaseWakeLock() {
  if (S.wakeLock) { try { await S.wakeLock.release(); S.wakeLock = null; } catch {} }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && S.session) requestWakeLock();
});

// ================================================================
// NAVIGATION
// ================================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(`screen-${id}`);
  if (!el) return;
  el.classList.add('active');

  const back  = document.getElementById('hdr-back');
  const title = document.getElementById('hdr-title');
  const noNav = ['session','warmup','cooldown'];

  back.classList.toggle('hidden', !['session','warmup','cooldown'].includes(id));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.screen === id));

  if (id === 'home')     { title.innerHTML = '<span class="hdr-brand">APEX</span>'; renderHome(); releaseWakeLock(); }
  else if (id === 'session') { title.textContent = PROGRAM.sessions[S.session]?.name || ''; requestWakeLock(); }
  else if (id === 'warmup')  { title.textContent = '🔥 Échauffement'; S.prevScreen = 'session'; renderWarmup(); }
  else if (id === 'cooldown'){ title.textContent = '🧘 Cool-down';    S.prevScreen = 'session'; renderCooldown(); }
  else if (id === 'coach')   { title.textContent = 'Coach IA'; renderCoach(); }
  else if (id === 'stats')   { title.textContent = 'Statistiques'; renderStats(); }
  else if (id === 'history') { title.textContent = 'Historique'; renderHistory(); }
  else if (id === 'settings'){ title.textContent = 'Réglages'; renderSettings(); }

  window.scrollTo(0, 0);
}
function goBack() { showScreen(S.prevScreen || 'home'); }

// ================================================================
// HOME
// ================================================================
function renderHome() {
  updateWeekChip();

  // Date
  const now  = new Date();
  const week = WEEKS[S.week - 1];
  document.getElementById('home-day').textContent = DAYS_FR[now.getDay()];
  document.getElementById('home-date').textContent = `${now.getDate()} ${MONTHS_FR[now.getMonth()]} · ${week.label}`;

  // Quote du jour (change selon le jour)
  const q = QUOTES[now.getDate() % QUOTES.length];
  document.getElementById('quote-text').textContent = `"${q.text}"`;
  document.getElementById('quote-author').textContent = `— ${q.author.toUpperCase()}`;

  // Streak
  const streak = computeStreak();
  document.getElementById('streak-num').textContent = streak;

  // Barre cycle
  const pct = Math.min(Math.round(((S.week - 1) / 6) * 100), 100);
  document.getElementById('cycle-fill').style.width = `${pct}%`;
  document.getElementById('cycle-label-mid').textContent = `S${S.week} — ${pct}%`;

  // KPIs
  const hist = DB.get('history', []);
  let vol = 0; const prSet = new Set();
  hist.forEach(e => {
    const d = DB.get(e.key); if (!d?.sets) return;
    Object.entries(d.sets).forEach(([id, arr]) => arr.forEach(s => {
      if (!s.done || !s.weight) return;
      vol += (parseFloat(s.weight)||0) * (parseInt(s.reps)||0);
      if (DB.get(`pr-${id}`)) prSet.add(id);
    }));
  });
  document.getElementById('kpi-sessions').textContent = hist.length;
  const volEl = document.getElementById('kpi-volume');
  if (vol >= 1000) { volEl.innerHTML = `${(vol/1000).toFixed(1)}<span class="kpi-unit">t</span>`; }
  else { volEl.innerHTML = `${Math.round(vol)}<span class="kpi-unit">kg</span>`; }
  document.getElementById('kpi-pr').textContent = prSet.size;
  const wLog = DB.get('weight-log', []);
  document.getElementById('kpi-weight').textContent = wLog.length ? `${wLog[wLog.length-1].w}` : '—';

  // Plan badge
  if (hist.length > 0 && S.week < 7) {
    S.nextWeekPlan = generateNextWeekPlan(S.week);
    const badge = document.getElementById('plan-badge');
    if (badge) badge.style.display = 'flex';
  }

  // Cartes séances
  const ORDER = ['push','pull','legs','upper','arms'];
  const ICONS = {push:'🔥',pull:'🎯',legs:'🦵',upper:'💪',arms:'💥'};
  const today = DAYS_FR[new Date().getDay()].toUpperCase();

  const list = document.getElementById('sessions-list');
  list.innerHTML = ORDER.map(id => {
    const sess  = PROGRAM.sessions[id];
    const saved = DB.get(sKey(id));
    const done  = saved?.finished;
    const isToday = sess.day.toUpperCase() === today;
    const deload = S.week === 7;

    if (done) {
      return `<div class="card-normal">
        <div class="card-icon">${ICONS[id]}</div>
        <div class="card-info">
          <div class="card-day">${sess.day.toUpperCase()}</div>
          <div class="card-name done-name">${sess.name}${deload?' ❄️':''}</div>
          <div class="card-meta">${saved.doneSets}/${saved.totalSets} séries · ${fmtTime(saved.date)} · il y a ${daysSince(saved.date)}j</div>
        </div>
        <div class="card-done-badge">FAIT</div>
      </div>`;
    }

    if (isToday) {
      const sessionPhoto = (typeof SESSION_PHOTOS !== 'undefined' && SESSION_PHOTOS[id]) ? SESSION_PHOTOS[id] : '';
      return `<div class="card-today" onclick="startSession('${id}')">
        <div class="card-today-photo" style="${sessionPhoto ? `background-image:url('${sessionPhoto}')` : ''}"></div>
        <div class="card-today-overlay"></div>
        <div class="today-tag">AUJOURD'HUI</div>
        <div class="card-today-content">
          <div class="card-today-day">${sess.day.toUpperCase()}</div>
          <div class="card-today-name">${sess.name}${deload?' ❄️':''}</div>
          <div class="card-pills">
            ${sess.focus.split('·').map(f=>`<span class="card-pill">${f.trim()}</span>`).join('')}
            <span class="card-pill">${sess.duration}</span>
          </div>
        </div>
        <div class="card-today-go"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>`;
    }

    return `<div class="card-normal ${id}" onclick="startSession('${id}')">
      <div class="card-icon">${ICONS[id]}</div>
      <div class="card-info">
        <div class="card-day">${sess.day.toUpperCase()}</div>
        <div class="card-name done-name">${sess.name}${deload?' ❄️':''}</div>
        <div class="card-meta">${sess.duration} · ${sess.focus}</div>
      </div>
      <svg class="card-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  }).join('');
}

function updateWeekChip() {
  const chip = document.getElementById('week-chip'); if (!chip) return;
  chip.textContent = `S${S.week}`;
  chip.classList.toggle('deload', S.week === 7);
}

function computeStreak() {
  const hist = DB.get('history', []);
  if (!hist.length) return 0;
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const days  = new Set(hist.map(e => { const d=new Date(e.date); d.setHours(0,0,0,0); return d.getTime(); }));
  let check = new Date(today);
  for (let i = 0; i < 30; i++) {
    if (days.has(check.getTime())) { streak++; check.setDate(check.getDate()-1); }
    else if (i === 0) check.setDate(check.getDate()-1);
    else break;
  }
  return streak;
}

function daysSince(dateStr) {
  const d = new Date(dateStr);
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

// ================================================================
// SESSION
// ================================================================
function startSession(id) {
  S.session = id;
  S.prevScreen = 'home';
  renderExercises();
  updateSessionProgress();
  updatePillChecks();

  // Photo et infos hero de la séance
  const sess = PROGRAM.sessions[id];
  const heroPhoto = document.getElementById('session-hero-photo');
  const heroName  = document.getElementById('session-hero-name');
  const heroDur   = document.getElementById('session-hero-duration');
  const heroSets  = document.getElementById('session-hero-sets');
  if (heroPhoto) {
    heroPhoto.innerHTML = getSessionImageHTML(id);
  }
  if (heroName) { heroName.textContent = sess.name; }
  if (heroDur) heroDur.textContent = sess.duration;
  const totalSets = sess.exercises.reduce((a,e)=>a+e.sets,0);
  if (heroSets) heroSets.textContent = `${totalSets} séries`;

  showScreen('session');
}

function renderExercises() {
  const id   = S.session;
  const sess = PROGRAM.sessions[id];
  const saved = DB.get(sKey(id), {sets:{}, finished:false});
  const deload = S.week === 7;

  // Savoir quelle série est "active" (la prochaine à faire)
  let activeExoId = null, activeSetIdx = -1;
  outer: for (const exo of sess.exercises) {
    const sets = saved.sets[exo.id] || [];
    for (let i = 0; i < exo.sets; i++) {
      if (!sets[i]?.done) { activeExoId = exo.id; activeSetIdx = i; break outer; }
    }
  }

  const list = document.getElementById('exercises-list');
  list.innerHTML = sess.exercises.map((exo, idx) => {
    const setsData = saved.sets[exo.id] || [];
    const doneCnt  = setsData.filter(s => s.done).length;
    const totalSets = Math.max(exo.sets, setsData.length);
    const allDone  = doneCnt >= exo.sets;
    const last     = getLastRecord(exo.id);
    const exoPR    = DB.get(`pr-${exo.id}`);
    const coachSug = S.nextWeekPlan?.[exo.id];
    const note     = saved.notes?.[exo.id] || '';

    // Charge suggérée
    let prefill = '';
    const confirmedPlan = DB.get(`plan-week-${S.week}`);
    if (confirmedPlan?.[exo.id]?.confirmedWeight) {
      prefill = confirmedPlan[exo.id].confirmedWeight;
    } else if (deload && exoPR) {
      prefill = Math.round(exoPR.weight * 0.8 * 2) / 2;
    } else if (coachSug?.suggestedWeight) {
      prefill = coachSug.suggestedWeight;
    }

    // Bandeau coach / historique
    let prevHtml = '';
    if (deload && exoPR) {
      const red = Math.round(exoPR.weight * 0.8 * 2) / 2;
      prevHtml = `<div class="coach-banner deload">❄️ Deload −20% : <strong style="color:#a0a0ff">${red} kg</strong> (PR : ${exoPR.weight} kg)</div>`;
    } else if (coachSug) {
      prevHtml = `<div class="coach-banner ${coachSug.type}">🤖 ${coachSug.reason}</div>`;
    } else if (last) {
      const best = last.sets.filter(s=>s.done&&s.weight).sort((a,b)=>b.weight*b.reps-a.weight*a.reps)[0];
      if (best) prevHtml = `<div class="last-perf">📅 Dernière fois : <strong>${best.weight} kg × ${best.reps} reps</strong></div>`;
    }

    // Rows de sets
    const rows = Array.from({length: totalSets}, (_, i) => {
      const set = setsData[i] || {weight:'', reps:'', done:false};
      const wVal = set.weight || (i === 0 && prefill ? prefill : (i > 0 && prefill ? prefill : ''));
      const isActive = exo.id === activeExoId && i === activeSetIdx;
      const isFill = !set.weight && prefill;
      const itKey  = `${exo.id}-${i}`;
      const iTimer = S.inlineTimers[itKey];
      let timerHtml;
      if (iTimer) {
        const m = Math.floor(iTimer.sec/60), sc = iTimer.sec%60;
        const cls = iTimer.sec===0 ? 'done' : iTimer.running ? 'running' : '';
        timerHtml = `<div class="set-rest-inline ${cls}" id="inline-timer-${itKey}">${m}:${String(sc).padStart(2,'0')}</div>`;
      } else {
        timerHtml = `<button class="set-timer-btn" onclick="startInlineTimer('${exo.id}',${i},${exo.restSec})">⏱</button>`;
      }
      return `<div class="set-row ${set.done?'set-done':''} ${isActive?'active-set':''}" id="setrow-${exo.id}-${i}">
        <div class="set-num ${isActive?'current':''}">${i+1}</div>
        <div class="set-w-group">
          <button class="set-adj" onclick="adjW('${exo.id}',${i},-1)">−</button>
          <input type="number" class="set-input ${isFill?'coach-fill':''}" placeholder="kg" inputmode="decimal" step="0.5" value="${wVal}" ${set.done?'readonly':''} id="w-${exo.id}-${i}" onchange="updSet('${exo.id}',${i},'weight',this.value)">
          <button class="set-adj" onclick="adjW('${exo.id}',${i},1)">+</button>
        </div>
        <input type="number" class="set-input" placeholder="reps" inputmode="numeric" value="${set.reps||''}" ${set.done?'readonly':''} id="r-${exo.id}-${i}" onchange="updSet('${exo.id}',${i},'reps',this.value)">
        ${timerHtml}
        <button class="set-ok ${set.done?'validated':''}" id="v-${exo.id}-${i}" onclick="toggleDone('${exo.id}',${i})">${set.done?'✓':'○'}</button>
      </div>`;
    }).join('');

    // Barre de progression de l'exo
    const exoPct = totalSets ? Math.round((doneCnt/exo.sets)*100) : 0;

    return `<div class="exo-card ${allDone?'complete':''}" id="exocard-${exo.id}">
      <div class="exo-photo-wrap" onclick="toggleExo('${exo.id}')">
        ${getExoImageHTML(exo.id)}
        <div class="exo-photo-overlay"></div>
        <div class="exo-photo-num">${allDone?'✓':idx+1}</div>
        <div class="exo-photo-content">
          <div class="exo-photo-name">${exo.name}</div>
          <div class="exo-photo-level">Intermédiaire</div>
        </div>
      </div>
      <div class="exo-prog"><div class="exo-prog-fill" style="width:${exoPct}%"></div></div>
      <div class="exo-header-simple" onclick="toggleExo('${exo.id}')">
        <div class="exo-num-sm">${allDone?'✓':idx+1}</div>
        <div class="exo-info">
          <div class="exo-name">${exo.name}</div>
          <div class="exo-specs">
            <div class="exo-spec main">${exo.sets}×${exo.reps}</div>
            <div class="exo-spec">⏱ ${exo.rest}</div>
            <div class="exo-spec">RIR ${exo.rir}</div>
            ${exo.tempo?`<div class="exo-spec">${exo.tempo}</div>`:''}
          </div>
        </div>
        <div class="exo-status ${allDone?'done-all':''}">${allDone?'✓':`${doneCnt}/${exo.sets}`}</div>
      </div>
      <div class="exo-body ${idx===0?'':'collapsed'}" id="body-${exo.id}">
        <div class="exo-technique"><strong>Technique :</strong> ${exo.technique}</div>
        <div class="muscle-bar">
          <div class="muscle-label">Muscles</div>
          <div class="muscle-tags">
            ${exo.name.toLowerCase().includes('pec') || exo.name.toLowerCase().includes('couché') || exo.name.toLowerCase().includes('décliné') ? '<div class="muscle-tag">Pectoraux</div>' : ''}
            ${exo.name.toLowerCase().includes('épaul') || exo.name.toLowerCase().includes('shoulder') || exo.name.toLowerCase().includes('laté') || exo.name.toLowerCase().includes('militaire') ? '<div class="muscle-tag">Deltoïdes</div>' : ''}
            ${exo.name.toLowerCase().includes('tricep') || exo.name.toLowerCase().includes('extension') || exo.name.toLowerCase().includes('dips') ? '<div class="muscle-tag">Triceps</div>' : ''}
            ${exo.name.toLowerCase().includes('dos') || exo.name.toLowerCase().includes('rowing') || exo.name.toLowerCase().includes('tirage') || exo.name.toLowerCase().includes('pull') ? '<div class="muscle-tag">Grand dorsal</div>' : ''}
            ${exo.name.toLowerCase().includes('bicep') || exo.name.toLowerCase().includes('curl') ? '<div class="muscle-tag">Biceps</div>' : ''}
            ${exo.name.toLowerCase().includes('quadri') || exo.name.toLowerCase().includes('presse') || exo.name.toLowerCase().includes('squat') || exo.name.toLowerCase().includes('extension') && exo.name.toLowerCase().includes('leg') ? '<div class="muscle-tag">Quadriceps</div>' : ''}
            ${exo.name.toLowerCase().includes('ischios') || exo.name.toLowerCase().includes('curl') && exo.name.toLowerCase().includes('leg') || exo.name.toLowerCase().includes('roumain') ? '<div class="muscle-tag">Ischios</div>' : ''}
            ${exo.name.toLowerCase().includes('fessier') || exo.name.toLowerCase().includes('hip') || exo.name.toLowerCase().includes('bulgarian') ? '<div class="muscle-tag">Fessiers</div>' : ''}
            ${exo.name.toLowerCase().includes('trapèze') || exo.name.toLowerCase().includes('shrug') ? '<div class="muscle-tag">Trapèzes</div>' : ''}
            ${exo.name.toLowerCase().includes('mollet') || exo.name.toLowerCase().includes('calf') ? '<div class="muscle-tag">Mollets</div>' : ''}
          </div>
        </div>
        ${prevHtml}
        <div class="sets-wrap">
          <div class="sets-hdr"><span>#</span><span>Charge</span><span>Reps</span><span></span><span>OK</span></div>
          ${rows}
        </div>
        <div class="exo-actions">
          <button class="exo-btn-sm" onclick="addExtraSet('${exo.id}')">+ Série bonus</button>
          <button class="exo-btn-sm" onclick="skipExo('${exo.id}')">Passer</button>
        </div>
        <div class="exo-note-row">
          <textarea class="exo-note-input" placeholder="📝 Note (genou droit, sensation...)" oninput="saveNote('${exo.id}',this.value)">${note}</textarea>
        </div>
      </div>
    </div>`;
  }).join('');

  initSwipe();
}

function toggleExo(id) { document.getElementById(`body-${id}`)?.classList.toggle('collapsed'); }

function adjW(exoId, i, dir) {
  const inp = document.getElementById(`w-${exoId}-${i}`);
  if (!inp || inp.readOnly) return;
  const cur = parseFloat(inp.value) || 0;
  const inc = S.increment;
  const nv  = Math.max(0, Math.round((cur + dir * inc) * 2) / 2);
  inp.value = nv;
  updSet(exoId, i, 'weight', nv);
}

function updSet(exoId, i, field, val) {
  const saved = DB.get(sKey(S.session), {sets:{}, finished:false});
  if (!saved.sets[exoId]) saved.sets[exoId] = [];
  if (!saved.sets[exoId][i]) saved.sets[exoId][i] = {weight:'', reps:'', done:false};
  saved.sets[exoId][i][field] = val;
  DB.set(sKey(S.session), saved);
}

function saveNote(exoId, val) {
  const saved = DB.get(sKey(S.session), {sets:{}, finished:false, notes:{}});
  if (!saved.notes) saved.notes = {};
  saved.notes[exoId] = val;
  DB.set(sKey(S.session), saved);
}

function toggleDone(exoId, i) {
  const saved = DB.get(sKey(S.session), {sets:{}, finished:false});
  if (!saved.sets[exoId]) saved.sets[exoId] = [];
  if (!saved.sets[exoId][i]) saved.sets[exoId][i] = {weight:'', reps:'', done:false};
  const set = saved.sets[exoId][i];

  if (!set.done) {
    if (!set.weight && !set.reps) { showToast('Entre la charge ou les reps !', 'error'); return; }
    set.done = true;
    const isPR = checkPR(exoId, parseFloat(set.weight)||0, parseInt(set.reps)||0);
    startInlineTimer(exoId, i, PROGRAM.sessions[S.session].exercises.find(e=>e.id===exoId)?.restSec || 120);
    if (navigator.vibrate) navigator.vibrate(40);
    if (isPR) { launchConfetti(); showToast(`🏆 Nouveau PR ! ${set.weight} kg`, 'pr'); }
  } else {
    set.done = false;
  }

  DB.set(sKey(S.session), saved);
  renderExercises();
  updateSessionProgress();
}

function checkPR(exoId, w, r) {
  if (!w) return false;
  const cur = DB.get(`pr-${exoId}`);
  if (!cur || w > cur.weight || (w === cur.weight && r > cur.reps)) {
    DB.set(`pr-${exoId}`, {weight:w, reps:r, date:new Date().toISOString()});
    return !cur || w > cur.weight;
  }
  return false;
}

function addExtraSet(exoId) {
  const saved = DB.get(sKey(S.session), {sets:{}, finished:false});
  if (!saved.sets[exoId]) saved.sets[exoId] = [];
  saved.sets[exoId].push({weight:'', reps:'', done:false});
  DB.set(sKey(S.session), saved);
  renderExercises();
  showToast('Série bonus ajoutée 💪');
}

function skipExo(exoId) {
  document.getElementById(`body-${exoId}`)?.classList.add('collapsed');
  const sess = PROGRAM.sessions[S.session];
  const idx  = sess.exercises.findIndex(e => e.id === exoId);
  if (idx < sess.exercises.length - 1) {
    const nextId = sess.exercises[idx+1].id;
    document.getElementById(`body-${nextId}`)?.classList.remove('collapsed');
    document.getElementById(`exocard-${nextId}`)?.scrollIntoView({behavior:'smooth', block:'start'});
  }
  showToast('Exercice passé');
}

function updateSessionProgress() {
  const sess  = PROGRAM.sessions[S.session];
  const saved = DB.get(sKey(S.session), {sets:{}});
  let total=0, done=0;
  sess.exercises.forEach(e => {
    const arr = saved.sets[e.id] || [];
    total += Math.max(e.sets, arr.length);
    done  += arr.filter(s => s.done).length;
  });
  const pct = total ? (done/total)*100 : 0;
  const fill = document.getElementById('sess-prog-fill');
  if (fill) fill.style.width = `${pct}%`;
  const meta = document.getElementById('finish-meta');
  if (meta) meta.textContent = `${done} / ${total} séries`;
}

function updatePillChecks() {
  const saved = DB.get(sKey(S.session), {});
  const wc = document.getElementById('warmup-check');
  const cc = document.getElementById('cooldown-check');
  if (wc) wc.textContent = saved.warmupDone ? ' ✓' : '';
  if (cc) cc.textContent = saved.cooldownDone ? ' ✓' : '';
}

function copyLastSession() {
  const id   = S.session;
  const sess = PROGRAM.sessions[id];
  const hist = DB.get('history', []);
  const last = hist.find(e => e.sessionId === id);
  if (!last) { showToast('Aucune séance précédente', 'error'); return; }
  const lastData = DB.get(last.key);
  if (!lastData?.sets) { showToast('Données introuvables', 'error'); return; }
  const cur = DB.get(sKey(id), {sets:{}, finished:false});
  sess.exercises.forEach(exo => {
    const prev = lastData.sets[exo.id] || [];
    if (!cur.sets[exo.id]) cur.sets[exo.id] = [];
    prev.forEach((s,i) => {
      if (!cur.sets[exo.id][i]) cur.sets[exo.id][i] = {weight:'', reps:'', done:false};
      if (!cur.sets[exo.id][i].done && s.weight) cur.sets[exo.id][i].weight = s.weight;
    });
  });
  DB.set(sKey(id), cur);
  renderExercises();
  showToast('📋 Charges copiées !', 'success');
}

function finishSession() {
  const id   = S.session;
  const sess = PROGRAM.sessions[id];
  const saved = DB.get(sKey(id), {sets:{}, finished:false});
  let total=0, done=0;
  sess.exercises.forEach(e => {
    const arr = saved.sets[e.id] || [];
    total += Math.max(e.sets, arr.length);
    done  += arr.filter(s => s.done).length;
  });
  if (done === 0) { showToast('Aucune série validée !', 'error'); return; }
  if (done < total && !confirm(`${done}/${total} séries. Terminer quand même ?`)) return;

  saved.finished = true;
  saved.date = new Date().toISOString();
  saved.doneSets = done; saved.totalSets = total;
  saved.sessionId = id; saved.sessionName = sess.name; saved.week = S.week;
  DB.set(sKey(id), saved);

  const hist = DB.get('history', []);
  hist.unshift({date:saved.date, sessionId:id, sessionName:sess.name, week:S.week, doneSets:done, totalSets:total, key:sKey(id)});
  DB.set('history', hist);

  // Progression par exo
  sess.exercises.forEach(exo => {
    const arr = (saved.sets[exo.id]||[]).filter(s => s.done && s.weight);
    if (!arr.length) return;
    const maxW = Math.max(...arr.map(s => parseFloat(s.weight)||0));
    const maxR = Math.max(...arr.filter(s => parseFloat(s.weight)===maxW).map(s => parseInt(s.reps)||0));
    const prog = DB.get(`prog-${exo.id}`, []);
    prog.push({date:saved.date, weight:maxW, reps:maxR, week:S.week});
    if (prog.length > 60) prog.shift();
    DB.set(`prog-${exo.id}`, prog);
  });

  // Journal de récupération
  const jEntry = {date:saved.date, sessionId:id, week:S.week, fatigue:S.tempFatigue||0, sommeil:S.tempSommeil||0, humeur:S.tempHumeur||0};
  if (jEntry.fatigue || jEntry.sommeil || jEntry.humeur) {
    const journal = DB.get('journal', []);
    journal.unshift(jEntry);
    DB.set('journal', journal);
  }

  // Arrêter inline timers
  Object.values(S.inlineTimers).forEach(t => { if (t.iv) clearInterval(t.iv); });
  S.inlineTimers = {};

  closeTimer();
  releaseWakeLock();
  launchConfetti();
  showToast('🔥 Séance terminée ! Beau boulot.', 'success');

  if (S.nextWeekPlan && S.week < 7) {
    setTimeout(() => showNextWeekModal(), 1000);
  } else {
    setTimeout(() => showScreen('home'), 800);
  }
}

// SWIPE TO VALIDATE
function initSwipe() {
  document.querySelectorAll('.set-row:not(.set-done)').forEach(row => {
    let sx=0, sy=0;
    row.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:true});
    row.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      const dy = Math.abs(e.changedTouches[0].clientY - sy);
      if (dx > 65 && dy < 30) {
        const btn = row.querySelector('.set-ok');
        if (btn && !btn.classList.contains('validated')) btn.click();
      }
    }, {passive:true});
  });
}

// ================================================================
// INLINE TIMER (dans chaque ligne de série)
// ================================================================
function startInlineTimer(exoId, setIdx, sec) {
  const key = `${exoId}-${setIdx}`;
  if (S.inlineTimers[key]?.iv) clearInterval(S.inlineTimers[key].iv);
  S.inlineTimers[key] = {sec, running:true, iv:null};

  const updateFn = () => {
    const t = S.inlineTimers[key]; if (!t) return;
    const el = document.getElementById(`inline-timer-${key}`);
    if (el) {
      const m = Math.floor(t.sec/60), s = t.sec%60;
      el.textContent = `${m}:${String(s).padStart(2,'0')}`;
      el.className = `set-rest-inline ${t.sec===0?'done':t.running?'running':''}`;
    }
    if (t.sec > 0 && t.running) t.sec--;
    else if (t.sec <= 0) {
      clearInterval(t.iv);
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
      playBeep();
    }
  };

  S.inlineTimers[key].iv = setInterval(updateFn, 1000);
  renderExercises(); // Pour afficher le timer inline
}

function showWarmup()  { S.prevScreen = 'session'; showScreen('warmup'); }
function showCooldown(){ S.prevScreen = 'session'; showScreen('cooldown'); }

function buildWuCard(cls, title, sub, duration, phases) {
  return `<div class="wu-card ${cls}">
    <div class="wu-card-hdr">
      <div><div class="wu-title">${title}</div><div class="wu-sub">${sub}</div></div>
      <div class="wu-dur">${duration}</div>
    </div>
    ${phases.map(p => `<div class="wu-phase">
      <div class="wu-phase-hdr"><div class="wu-phase-title">${p.title}</div><div class="wu-phase-time">${p.time}</div></div>
      ${p.items.map(item => `<div class="wu-item">${item}</div>`).join('')}
    </div>`).join('')}
  </div>`;
}

function renderWarmup() {
  const spec = WARMUPS[S.session];
  const sess = PROGRAM.sessions[S.session];
  const saved = DB.get(sKey(S.session), {});
  const total = 5 + (parseInt(spec.specificDuration)||3);
  let html = buildWuCard('general','🔥 Échauffement général','Toutes séances',WARMUP_GENERAL.duration,WARMUP_GENERAL.phases);
  if (WARMUP_GENERAL.warning) html += `<div class="wu-alert warn"><strong>⚠️</strong> ${WARMUP_GENERAL.warning}</div>`;
  html += buildWuCard('specific',`🎯 Spécifique · ${sess.name}`,spec.focus,spec.specificDuration,spec.phases);
  if (spec.warning) html += `<div class="wu-alert warn"><strong>⚠️</strong> ${spec.warning}</div>`;
  if (spec.tip)     html += `<div class="wu-alert tip"><strong>💡</strong> ${spec.tip}</div>`;
  html += `<div class="wu-summary"><div class="wu-sum-val">~${total} min</div><div class="wu-sum-lbl">+5-10% perf · −50% risque blessure</div></div>`;
  document.getElementById('warmup-content').innerHTML = html;

let T = {sec:0, total:0, running:false, iv:null};
const CIRC = 327;

function startRestTimer(sec) {
  closeTimer(); T.sec=sec; T.total=sec; T.running=true;
  document.getElementById('rest-timer').classList.remove('hidden');
  updateTimerUI();
  T.iv = setInterval(() => { if(!T.running) return; T.sec--; if(T.sec<=0){T.sec=0;T.running=false;playBeep();if(navigator.vibrate)navigator.vibrate([300,100,300]);} updateTimerUI(); }, 1000);
}
function updateTimerUI() {
  const m=Math.floor(T.sec/60), s=T.sec%60;
  const d=document.getElementById('timer-display'); if(d) d.textContent=`${m}:${String(s).padStart(2,'0')}`;
  const ring=document.getElementById('ring-fill'); if(ring){ring.style.strokeDashoffset=T.total?CIRC*(1-T.sec/T.total):0;ring.className='ring-fill'+(T.sec===0?' done':T.sec<=10?' ending':'');}
  const tog=document.getElementById('timer-toggle'); if(tog) tog.textContent=T.running?'⏸':'▶';
}
function toggleTimer(){T.running=!T.running;updateTimerUI();}
function addTimerSeconds(d){T.sec=Math.max(0,T.sec+d);T.total=Math.max(T.total,T.sec);if(T.sec>0&&!T.running)T.running=true;updateTimerUI();}
function closeTimer(){if(T.iv)clearInterval(T.iv);T.running=false;document.getElementById('rest-timer')?.classList.add('hidden');}
function playBeep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[880,1100].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.value=0.07;o.start(ctx.currentTime+i*.25);o.stop(ctx.currentTime+i*.25+.2);});}catch{}}

async function sendMsg() {
  const inp  = document.getElementById('coach-inp');
  const btn  = document.getElementById('coach-send-btn');
  const chat = document.getElementById('coach-chat');
  if (!inp || !chat) return;
  const q = inp.value.trim(); if (!q) return;

  const uDiv = document.createElement('div'); uDiv.className='cmsg user'; uDiv.textContent=q; chat.appendChild(uDiv);
  S.coachHistory.push({role:'user', content:q});
  inp.value = '';
  chat.scrollTop = chat.scrollHeight;

  const thinkDiv = document.createElement('div'); thinkDiv.className='cmsg ai thinking'; chat.appendChild(thinkDiv);
  if (btn) btn.disabled = true;

  try {
    let resp = '';
    const rDiv = document.createElement('div'); rDiv.className='cmsg ai';
    await askCoachAI(q, chunk => {
      if (chat.contains(thinkDiv)) { chat.removeChild(thinkDiv); chat.appendChild(rDiv); }
      resp += chunk; rDiv.textContent = resp; chat.scrollTop = chat.scrollHeight;
    });
    if (resp) { S.coachHistory.push({role:'assistant', content:resp}); if(chat.contains(thinkDiv)){chat.removeChild(thinkDiv);chat.appendChild(rDiv);rDiv.textContent=resp;} }
    else { if(chat.contains(thinkDiv)){chat.removeChild(thinkDiv);} const e=document.createElement('div');e.className='cmsg ai';e.textContent="Réponse vide. Réessaie.";chat.appendChild(e); }
  } catch(err) {
    if(chat.contains(thinkDiv)) chat.removeChild(thinkDiv);
    const e=document.createElement('div'); e.className='cmsg ai';
    e.textContent=`⚠️ ${err.message} — Le Coach IA nécessite internet. L'algo de progression fonctionne hors-ligne.`;
    chat.appendChild(e);
  } finally {
    if(btn) btn.disabled=false; chat.scrollTop=chat.scrollHeight;
  }
}

function renderHeatmap() {

function drawChart(canvas, data, color, valFn=d=>d.weight) {
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.getBoundingClientRect().width, H=130;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const vals=data.map(d=>valFn(d));
  const minV=Math.min(...vals), maxV=Math.max(...vals), range=maxV-minV||1;
  const pad={t:10,r:8,b:22,l:40};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.t+cH*(1-i/4);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cW,y);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px system-ui';ctx.textAlign='right';ctx.fillText(Math.round(minV+range*i/4)+'kg',pad.l-4,y+3);}
  const pts=data.map((d,i)=>({x:pad.l+(i/Math.max(data.length-1,1))*cW, y:pad.t+cH*((maxV-valFn(d))/range)}));
  if(pts.length>=2){const grad=ctx.createLinearGradient(0,pad.t,0,H);grad.addColorStop(0,color+'50');grad.addColorStop(1,color+'00');ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,pad.t+cH);ctx.lineTo(pts[0].x,pad.t+cH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();}
  pts.forEach((p,i)=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='#080810';ctx.lineWidth=2;ctx.stroke();if(i===0||i===data.length-1||i%Math.ceil(data.length/5)===0){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px system-ui';ctx.textAlign='center';ctx.fillText(fmtDate(data[i].date),p.x,pad.t+cH+14);}});
}

// ================================================================
// HISTORY
// ================================================================
function renderHistory() {
  const hist=DB.get('history',[]);
  const el=document.getElementById('history-content');
  if(!hist.length){el.innerHTML='<div style="text-align:center;padding:60px 16px;color:var(--text3)"><div style="font-size:48px;margin-bottom:12px">📜</div><div>Aucune séance terminée</div></div>';return;}
  el.innerHTML=hist.map(e=>`<div class="history-item">
    <div class="history-hdr"><div class="history-name">${e.sessionName}</div><div class="history-date">${fmtDateLong(e.date)}</div></div>
    <div class="history-meta">${e.doneSets}/${e.totalSets} séries · ${fmtTime(e.date)}</div>
    <span class="history-week-badge">Semaine ${e.week}</span>
  </div>`).join('');
}

// ================================================================
// SETTINGS
// ================================================================
function renderSettings() {
  const el=document.getElementById('settings-content');
  el.innerHTML=`
    <div class="settings-group">
      <div class="settings-group-title">Semaine active</div>
      <div class="week-btns-grid">${WEEKS.map(w=>`<button class="w-btn ${w.deload?'deload':''} ${w.num===S.week?'active':''}" onclick="setWeek(${w.num})">S${w.num}</button>`).join('')}</div>
      <div class="settings-hint">Semaine 7 = DELOAD : charges −20% automatiques et pré-remplies.</div>
    </div>

    <div class="settings-group">
      <div class="settings-group-title">Incrément de charge</div>
      <div style="display:flex;gap:8px;padding:10px 15px 14px">
        ${[1,2,2.5,5].map(v=>`<button onclick="setIncrement(${v})" style="flex:1;padding:10px 4px;border-radius:var(--r-sm);border:1px solid ${S.increment===v?'var(--red)':'var(--border)'};background:${S.increment===v?'var(--red)':'var(--bg3)'};color:${S.increment===v?'white':'var(--text)'};font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer">${v} kg</button>`).join('')}
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-title">Couleur principale</div>
      <div class="theme-btns">
        ${THEMES.map(t=>`<button class="theme-btn ${S.theme===t.name?'active':''}" style="background:${t.color}" onclick="setTheme('${t.name}')" title="${t.name}"></button>`).join('')}
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-title">Coach IA</div>
      <div class="settings-row" onclick="if(S.nextWeekPlan){showNextWeekModal();}else{showToast('Pas encore de données','error');}"><div class="settings-row-label">📋 Voir plan semaine suivante</div><div class="settings-row-val">›</div></div>
    </div>

    <div class="settings-group">
      <div class="settings-group-title">Données</div>
      <div class="settings-row" onclick="exportData()"><div class="settings-row-label">📤 Exporter</div><div class="settings-row-val">JSON</div></div>
      <div class="settings-row" onclick="document.getElementById('import-file').click()"><div class="settings-row-label">📥 Importer</div><div class="settings-row-val">›</div></div>
      <input type="file" id="import-file" accept=".json" onchange="importData(event)" style="display:none">
    </div>

    <div class="settings-group">
      <div class="settings-group-title">Danger</div>
      <div class="settings-row" onclick="confirmReset()"><div class="settings-row-label settings-row-danger">🗑️ Tout réinitialiser</div></div>
    </div>

    <div class="settings-group">
      <div class="settings-group-title">À propos</div>
      <div class="settings-row"><div class="settings-row-label">APEX</div><div class="settings-row-val">v5.0</div></div>
      <div class="settings-row"><div class="settings-row-label">Stockage</div><div class="settings-row-val">Local · 0 cloud</div></div>
    </div>`;
}

function setWeek(n){S.week=n;DB.set('week',n);updateWeekChip();renderSettings();showToast(`Semaine ${n}${n===7?' ❄️ Deload':''}`,n===7?'':'success');}
function setIncrement(v){S.increment=v;DB.set('increment',v);renderSettings();showToast(`Incrément : ${v} kg`);}
function setTheme(name){S.theme=name;DB.set('theme',name);applyTheme(name);renderSettings();}

// ================================================================
// HELPERS
// ================================================================
function getLastRecord(exoId) {
  const hist=DB.get('history',[]);
  for(const e of hist){const d=DB.get(e.key);if(d?.sets?.[exoId]?.some(s=>s.done&&s.weight))return{date:e.date,sets:d.sets[exoId]};}
  return null;
}
function fmtDate(d){const dt=new Date(d);return`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;}
function fmtDateLong(d){const dt=new Date(d);return dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});}
function fmtTime(d){const dt=new Date(d);return dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

function showToast(msg,type=''){const t=document.getElementById('toast');t.className=`toast ${type}`;t.textContent=msg;requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>t.classList.remove('show'),2600);}

function launchConfetti(){const colors=['#ff3b3b','#30d158','#ff9f0a','#0a84ff','#bf5af2'];for(let i=0;i<22;i++){const el=document.createElement('div');el.className='confetti-p';el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.5}s;animation-duration:${1+Math.random()*1}s`;document.body.appendChild(el);setTimeout(()=>el.remove(),2500);}}

function exportData(){const data={};Object.keys(localStorage).filter(k=>k.startsWith('apfp.')).forEach(k=>data[k]=localStorage.getItem(k));const blob=new Blob([JSON.stringify({version:'5.0',date:new Date().toISOString(),data},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`apex-backup-${fmtDate(new Date())}.json`;a.click();URL.revokeObjectURL(url);showToast('Backup exporté ✓','success');}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const obj=JSON.parse(ev.target.result);if(!obj.data)throw new Error();if(!confirm('Importer ? Les données actuelles seront remplacées.'))return;Object.entries(obj.data).forEach(([k,v])=>localStorage.setItem(k,v));S.week=DB.get('week',1);updateWeekChip();showToast('Import réussi ✓','success');showScreen('home');}catch{showToast('Fichier invalide','error');}};reader.readAsText(file);}
function confirmReset(){if(!confirm('Supprimer TOUTES les données APEX ? Irréversible.'))return;if(!confirm('Vraiment ?'))return;DB.clear();S.week=1;S.nextWeekPlan=null;S.coachHistory=[];updateWeekChip();showToast('Données réinitialisées');showScreen('home');}

window.addEventListener('load', init);

</script>
</body>
